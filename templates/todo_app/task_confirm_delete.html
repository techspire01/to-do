{% extends "base.html" %}

{% block title %}Delete Task | To-Do Manager{% endblock %}

{% block content %}
<div class="hero-card auth-card mx-auto p-4 p-md-5">
    <h1 class="h3 fw-bold mb-2">Delete task</h1>
    <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ task.title }}</strong>? This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

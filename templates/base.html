<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}To-Do Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f2efe8;
            --bg-2: #dbe4f0;
            --ink: #122033;
            --muted: #627188;
            --card: rgba(255, 255, 255, 0.92);
            --border: rgba(18, 32, 51, 0.1);
        }
        body {
            min-height: 100vh;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(235, 123, 72, 0.22), transparent 28%),
                radial-gradient(circle at right, rgba(56, 93, 138, 0.18), transparent 30%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, #f7fafc 100%);
        }
        .page-shell {
            max-width: 1380px;
        }
        .hero-card {
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 18px 50px rgba(38, 63, 88, 0.12);
            backdrop-filter: blur(12px);
        }
        .board-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(240px, 1fr));
            gap: 1rem;
        }
        .board-column {
            border: 1px solid var(--border);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.72);
            min-height: 460px;
            padding: 1rem;
        }
        .task-card {
            border: 1px solid rgba(18, 32, 51, 0.08);
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 10px 24px rgba(18, 32, 51, 0.08);
        }
        .mini-label {
            letter-spacing: 0.12em;
            text-transform: uppercase;
            font-size: 0.72rem;
            color: var(--muted);
        }
        .deadline-warning {
            color: #9a3412;
            font-weight: 600;
        }
        .auth-card {
            max-width: 480px;
        }
        .task-form-card {
            max-width: 760px;
        }
        @media (max-width: 1200px) {
            .board-grid {
                grid-template-columns: repeat(2, minmax(260px, 1fr));
            }
        }
        @media (max-width: 768px) {
            .board-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
        <div class="container page-shell">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">Jira-Style Task Board</a>
            <div class="ms-auto d-flex gap-2 align-items-center">
                {% if user.is_authenticated %}
                    <span class="text-muted small">Signed in as {{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-outline-dark btn-sm" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-dark btn-sm" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-dark btn-sm" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container page-shell py-5">
        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
